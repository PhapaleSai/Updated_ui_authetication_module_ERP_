<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admission and Enrollment Frontend</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <!-- Generic ERP theme -->
    <link rel="stylesheet" href="/erp-theme.css" />

    <!-- Default reusable module config. Replace with another college folder for a new skin. -->
    <link rel="stylesheet" href="/colleges/default/config.css" />
    
    <style>
      @media print {
        body { background: white !important; margin: 0; padding: 0; }
        #root { padding: 0 !important; width: 100% !important; max-width: 100% !important; }
        .erp-sidebar, .erp-topbar, .no-print { display: none !important; }
        .erp-main.print-container { padding: 0 !important; margin: 0 !important; }
        .print-header { display: block !important; }
        .erp-card { border: none !important; box-shadow: none !important; margin-bottom: 32px !important; }
        .erp-card__header { border-bottom: 2px solid #000 !important; margin-bottom: 12px !important; }
        .erp-table th { background-color: #f1f5f9 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- ERP Base Script for modals/toasts (Optional to remove if converted fully to React later, but included as per theme instructions) -->
    <script src="/erp-theme.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
